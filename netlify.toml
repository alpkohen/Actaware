[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Methods = "GET, POST, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Actaware-Test-Secret"

[functions]
  node_bundler = "esbuild"

# Hourly trigger; the function only runs the job when local time is 08:00 in Europe/London (GMT/BST).
[functions."send-alerts-background"]
  schedule = "0 * * * *"

# Every 2 hours: CRITICAL-only supplemental emails for Professional / Agency (~24h window).
[functions."send-critical-alerts-background"]
  schedule = "15 */2 * * *"

# Hourly; sends only Fri 16:00 Europe/London — Professional / Agency weekly recap.
[functions."send-weekly-summary-background"]
  schedule = "0 * * * *"
  timeout = 120

# Extended timeout for AI quality test (23 Claude calls ~90s total).
[functions."test-ai-quality"]
  timeout = 300

# Golden dataset eval: 2 Claude calls per case + Supabase insert.
[functions."eval-alerts"]
  schedule = "0 8 * * 1"
  timeout = 300
  included_files = ["data/golden_dataset.json"]
