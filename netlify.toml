[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[functions]
  node_bundler = "esbuild"

# Hourly trigger; the function only runs the job when local time is 08:00 in Europe/London (GMT/BST).
[functions."send-alerts-background"]
  schedule = "0 * * * *"

# Every 2 hours: CRITICAL-only supplemental emails for Professional / Agency (~24h window).
[functions."send-critical-alerts-background"]
  schedule = "15 */2 * * *"

# Extended timeout for AI quality test (23 Claude calls ~90s total).
[functions."test-ai-quality"]
  timeout = 300
