[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://act-aware.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[functions]
  node_bundler = "esbuild"

# Hourly trigger; the function only runs the job when local time is 08:00 in Europe/London (GMT/BST).
[functions."send-alerts-background"]
  schedule = "0 * * * *"
