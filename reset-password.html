<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — ActAware</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f3f4f6; color: #111; min-height: 100vh; }
    header {
      background: #0B1829;
      padding: 0 24px;
      min-height: 56px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    header a.logo {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
    }
    header a.logo span { color: #C9922A; }
    .card {
      max-width: 420px;
      margin: 48px auto;
      padding: 32px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(11,24,41,0.06);
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p.lead { font-size: 14px; color: #6b7280; margin-bottom: 20px; line-height: 1.55; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #6366f1; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 14px; display: none; }
    .msg.err { color: #dc2626; display: block; }
    .msg.ok { color: #059669; display: block; }
    .gate { text-align: center; padding: 24px 16px; color: #6b7280; font-size: 14px; }
    .gate a { color: #1e3051; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">Act<span>Aware</span></a>
  </header>

  <div id="gate" class="gate" style="display:none;">
    <p>This reset link is invalid or has expired.</p>
    <p style="margin-top:12px;"><a href="dashboard.html">Back to sign in</a></p>
  </div>

  <div id="app" class="card" style="display:none;">
    <h1>Choose a new password</h1>
    <p class="lead">Use at least 8 characters. You’ll use this with your email to sign in to My alerts.</p>
    <label for="pw1">New password</label>
    <input type="password" id="pw1" autocomplete="new-password" minlength="8">
    <label for="pw2">Confirm password</label>
    <input type="password" id="pw2" autocomplete="new-password" minlength="8">
    <button type="button" class="btn" id="btn-save">Update password</button>
    <p class="msg" id="msg"></p>
    <p style="margin-top:20px;font-size:13px;"><a href="dashboard.html">Sign in</a></p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.49.1";

    (async () => {
      const gate = document.getElementById("gate");
      const app = document.getElementById("app");
      const msg = document.getElementById("msg");

      function showMsg(text, ok) {
        msg.textContent = text || "";
        msg.className = "msg" + (text ? (ok ? " ok" : " err") : "");
      }

      const cfgRes = await fetch("/.netlify/functions/public-config");
      const cfg = await cfgRes.json().catch(() => ({}));
      if (!cfgRes.ok || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
        gate.style.display = "block";
        gate.querySelector("p").textContent = "Configuration error. Try again later.";
        return;
      }

      const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
        auth: {
          flowType: "pkce",
          detectSessionInUrl: true,
          persistSession: true,
          autoRefreshToken: true,
        },
      });

      let unlocked = false;
      let btnListenerAdded = false;

      function showForm() {
        if (unlocked) return;
        unlocked = true;
        gate.style.display = "none";
        app.style.display = "block";
        if (!btnListenerAdded) addBtnListener();
      }

      function showGate() {
        if (unlocked) return;
        gate.style.display = "block";
      }

      function addBtnListener() {
        btnListenerAdded = true;
        document.getElementById("btn-save").addEventListener("click", async () => {
          const a = document.getElementById("pw1").value;
          const b = document.getElementById("pw2").value;
          if (a.length < 8) { showMsg("Password must be at least 8 characters.", false); return; }
          if (a !== b) { showMsg("Passwords do not match.", false); return; }
          showMsg("", false);
          const btn = document.getElementById("btn-save");
          btn.disabled = true;
          const { error } = await supabase.auth.updateUser({ password: a });
          btn.disabled = false;
          if (error) { showMsg(error.message || "Could not update password.", false); return; }
          showMsg("Password updated. Redirecting to My alerts…", true);
          setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
        });
      }

      // Listen for PKCE code exchange — fires PASSWORD_RECOVERY or SIGNED_IN after exchange
      supabase.auth.onAuthStateChange((event, session) => {
        if ((event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") && session) {
          showForm();
        }
      });

      // Check if session already exists (e.g. page reload after exchange)
      const { data: { session: initial } } = await supabase.auth.getSession();
      if (initial) showForm();

      // PKCE exchange can take a few seconds — poll up to 8s before giving up
      if (!unlocked) {
        const deadline = Date.now() + 8000;
        while (Date.now() < deadline) {
          await new Promise((r) => setTimeout(r, 400));
          const { data: { session: s } } = await supabase.auth.getSession();
          if (s) { showForm(); break; }
        }
      }

      if (!unlocked) showGate();
    })();
  </script>
</body>
</html>
