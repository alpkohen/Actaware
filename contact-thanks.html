<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message sent — ActAware</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1829; --gold: #C9922A; --off-white: #F8F7F4; --text-mid: #4A4A4A; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 24px 40px;
      text-align: center;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      color: var(--navy);
      margin-bottom: 12px;
    }
    p { color: var(--text-mid); max-width: 420px; line-height: 1.55; margin-bottom: 28px; }
    a {
      display: inline-block;
      background: var(--navy);
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    a:hover { opacity: 0.9; }
    a.inline-link {
      display: inline;
      padding: 0;
      background: none;
      color: var(--navy);
      text-decoration: underline;
      font-weight: 600;
    }
    /* Logo link must override global `a` button styles (navy bg made "Act" invisible on navy) */
    a.logo {
      display: inline-block;
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--navy);
      background: transparent;
      padding: 0;
      border-radius: 0;
      text-decoration: none;
      margin-bottom: 32px;
    }
    a.logo:hover { opacity: 0.85; }
    a.logo span { color: var(--gold); }
    .thanks-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: #0B1829;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .thanks-top a.nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: transparent;
      padding: 0;
      border-radius: 0;
    }
    .thanks-top a.nav-logo span { color: var(--gold); }
  </style>
</head>
<body>
  <div class="thanks-top">
    <a href="/" class="nav-logo">Act<span>Aware</span></a>
    <div id="auth-status"></div>
  </div>
  <a href="/" class="logo">Act<span>Aware</span></a>
  <h1>Thanks — we’ve got your message</h1>
  <p>We’ll get back to you within one UK business day where possible. If your question is urgent, you can also email <a href="mailto:hello@actaware.co.uk" class="inline-link">hello@actaware.co.uk</a>.</p>
  <a href="/">Back to home</a>
  <script type="module">
    import { initAuthStatus } from "/js/auth-header.js";
    initAuthStatus();
  </script>
</body>
</html>
